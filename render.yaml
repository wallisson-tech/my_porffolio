databases:
  name: mysite
  databaseName: mysite
  user: mysite
  plan: free

services:
  type: web
  name: mysite
  runtime: ruby
  plan: free
  buildCommand: "./bin/render-build.sh"
  # preDeployCommand: "bundle exec rails db:migrate" # predeployCommand only available on paid instances types
  startCommand: "bundle exec rails server"
  enVars:
    - key: DATABASE_URL
      fromDatabase:
        name: mysite
        property: connectingString
    - key: RAILS_MASTER_KEY
      sinc-false- key: WEB_CONCURRENCY
      value: 2 # sensible default